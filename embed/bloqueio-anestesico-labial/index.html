<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Aula Liberada – Bloqueio Anestésico Labial</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      width: 100%; height: 100%;
      background: #000; overflow: hidden;
      display: flex; align-items: center; justify-content: center;
    }
    .video-wrapper {
      position: relative;
      /* Fit 16:9 inside viewport, leaving room for safe-area (home indicator / gesture bar) */
      width: min(100vw, calc((100dvh - env(safe-area-inset-bottom, 20px)) * 16 / 9));
      height: min(calc(100dvh - env(safe-area-inset-bottom, 20px)), calc(100vw * 9 / 16));
      overflow: hidden;
    }
    iframe {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      border: none;
    }
    #cta {
      display: none;
      position: absolute;
      bottom: 80px;
      right: 12px;
      z-index: 10;
      background: rgba(20, 20, 20, 0.88);
      color: #fff;
      padding: 8px 12px;
      border-radius: 6px;
      text-decoration: none;
      max-width: min(170px, 45%);
      line-height: 1.3;
    }
    #cta strong {
      display: block;
      font-size: 12px;
      font-family: sans-serif;
    }
    #cta span {
      display: block;
      font-size: 11px;
      font-family: sans-serif;
      opacity: 0.8;
      margin-top: 2px;
    }
  </style>
</head>
<body>
  <div class="video-wrapper" id="wrapper">
    <iframe
      id="vimeo-player"
      src="https://player.vimeo.com/video/1176329057?h=9bcf05f018&badge=0&autopause=0&player_id=0&app_id=58479"
      width="960"
      height="540"
      allow="autoplay; fullscreen; picture-in-picture; clipboard-write; encrypted-media; web-share"
      referrerpolicy="strict-origin-when-cross-origin"
      title="Aula Liberada Bloqueio Anestésico Labial"
    ></iframe>
    <a id="cta" href="https://patriciapaturle.hotmart.host/imersao-em-labios-lab-academy-1d8bf07f-6c97-4943-9d5d-5a1a383a3a6f" target="_blank">
      <strong id="cta-title"></strong>
      <span id="cta-sub"></span>
    </a>
  </div>
  <script src="https://player.vimeo.com/api/player.js"></script>
  <script>
    var ctas = [
      { from: 270, title: 'Vá além do volume',    sub: 'Ver o curso completo' },
      { from: 510, title: 'Construção Labial',     sub: 'Ver o curso completo' },
      { from: 690, title: 'Curso Imersão Labial',  sub: 'Vagas abertas: Lote 1' },
      { from: 720, title: 'Garantir Lote 1',       sub: 'De R$1.997,00 por R$497' },
    ];

    var wrapper  = document.getElementById('wrapper');
    var iframe   = document.getElementById('vimeo-player');
    var cta      = document.getElementById('cta');
    var ctaTitle = document.getElementById('cta-title');
    var ctaSub   = document.getElementById('cta-sub');

    var player = new Vimeo.Player('vimeo-player');

    player.on('timeupdate', function(data) {
      var seconds = data.seconds;
      var active = null;
      for (var i = 0; i < ctas.length; i++) {
        if (seconds >= ctas[i].from) active = ctas[i];
      }
      if (active) {
        ctaTitle.textContent = active.title;
        ctaSub.textContent   = active.sub;
        cta.style.display    = 'block';
      } else {
        cta.style.display = 'none';
      }
    });
  </script>
</body>
</html>
